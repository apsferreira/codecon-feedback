apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: codecon-frontend
  namespace: codecon
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`codecon-demo.institutoitinerante.com.br`)
      kind: Rule
      services:
        - name: codecon-feedback-frontend
          port: 80
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: codecon-backend
  namespace: codecon
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`codecon-demo.institutoitinerante.com.br`) && PathPrefix(`/api`)
      kind: Rule
      services:
        - name: codecon-feedback-backend
          port: 80
